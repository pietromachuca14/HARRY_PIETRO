<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Jogador - AV1 DWB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">← ⚽ Jogadores do Corinthians</a>
            <span class="navbar-text text-white" id="loading-badge" style="display: none;">
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Carregando...
            </span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container my-5">
        <!-- Alert de Erro -->
        <div id="error-alert" class="alert alert-danger alert-dismissible fade" role="alert" style="display: none;">
            <strong>Erro ao carregar dados!</strong>
            <span id="error-message"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Card de Detalhes -->
        <div id="player-details" class="row">
            <!-- Conteúdo será inserido aqui via JavaScript -->
        </div>

        <!-- Mensagem de erro quando ID não existe -->
        <div id="not-found" class="alert alert-warning text-center" role="alert" style="display: none;">
            <h4>❌ Jogador não encontrado</h4>
            <p>O ID do jogador solicitado não existe.</p>
            <a href="index.html" class="btn btn-primary mt-3">Voltar para Listagem</a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2026 - AV1 DWB - Jogadores do Corinthians | Pietro</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/detalhes.js"></script>
</body>
</html>
